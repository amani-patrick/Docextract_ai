version: "3.9"

services:
  api:
    image: ghcr.io/amani-patrick/docuextract-ai:latest
    container_name: docuextract-api
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - LOG_LEVEL=info
      - MAX_FILE_SIZE_MB=50
      # Add API Key for fine-tuning
    volumes:
      # Hot-reload in dev: mount source
      - ./app:/app/app
      # Persist custom type registry across restarts
      - docuextract_data:/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: docuextract-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    profiles:
      - production

volumes:
  docuextract_data:
